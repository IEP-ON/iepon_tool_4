<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEP-ON 피드 4 - 보호자 작성</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        .feed-container { 
            width: 1080px; 
            height: 1080px; 
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
        }
        
        .header { text-align: center; margin-bottom: 15px; z-index: 10; }
        
        .step-badge { 
            background: #f59e0b;
            color: white; 
            padding: 10px 24px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 24px; 
            display: inline-block; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .title { 
            font-size: 68px; 
            font-weight: 900; 
            color: #78350f; 
            margin: 0 0 15px 0; 
            line-height: 1.2; 
        }
        
        .highlight { color: #f59e0b; }
        
        .subtitle { 
            font-size: 34px; 
            font-weight: 600; 
            color: #92400e; 
            margin: 0; 
        }
        
        .form-flow {
            width: 850px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        .flow-step {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid white;
            border-radius: 30px;
            padding: 22px 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .step-number {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
        }
        
        .step-content {
            flex: 1;
        }
        
        .step-title {
            font-size: 34px;
            font-weight: 800;
            color: #78350f;
            margin-bottom: 8px;
        }
        
        .step-desc {
            font-size: 26px;
            font-weight: 600;
            color: #92400e;
            line-height: 1.4;
        }
        
        .final-result {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.4);
        }
        
        .result-icon {
            font-size: 90px;
            margin-bottom: 15px;
        }
        
        .result-text {
            font-size: 38px;
            font-weight: 900;
            line-height: 1.4;
        }
        
        .deco-pattern {
            position: absolute;
            font-size: 200px;
            opacity: 0.08;
        }
        
        .deco-pattern:nth-child(1) { top: 80px; right: 100px; }
        .deco-pattern:nth-child(2) { bottom: 80px; left: 100px; }
    </style>
</head>
<body>
    <div class="feed-container">
        <div class="deco-pattern">✍️</div>
        <div class="deco-pattern">✅</div>
        
        <div class="header">
            <div class="step-badge">STEP 3. 보호자 작성</div>
            <h1 class="title">요즘 <span class="highlight">전자계약</span> 느낌으로<br>편하게 작성!</h1>
            <p class="subtitle">체크박스만 누르면 자동으로 PDF 생성</p>
        </div>
        
        <div class="form-flow">
            <div class="flow-step">
                <div class="step-number">1</div>
                <div class="step-content">
                    <div class="step-title">질문에 답변 작성</div>
                    <div class="step-desc">학생 강점, 지원 필요 영역 등 간단히 입력</div>
                </div>
            </div>
            
            <div class="flow-step">
                <div class="step-number">2</div>
                <div class="step-content">
                    <div class="step-title">동의 항목 체크</div>
                    <div class="step-desc">전자계약처럼 체크박스로 간편하게</div>
                </div>
            </div>
            
            <div class="flow-step">
                <div class="step-number">3</div>
                <div class="step-content">
                    <div class="step-title">서명 후 제출</div>
                    <div class="step-desc">터치/마우스로 서명하고 제출 완료!</div>
                </div>
            </div>
            
            <div class="final-result">
                <div class="result-icon">📄</div>
                <div class="result-text">제출 즉시<br>최종 PDF 자동 생성!</div>
            </div>
        </div>
    </div>
</body>
</html>
