<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEP-ON 피드 2 - QR 안내장</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        .feed-container { 
            width: 1080px; 
            height: 1080px; 
            background: #f0f9ff; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
        }
        
        .header { text-align: center; margin-bottom: 15px; z-index: 10; }
        
        .step-badge { 
            background: #10b981;
            color: white; 
            padding: 10px 24px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 24px; 
            display: inline-block; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .title { 
            font-size: 70px; 
            font-weight: 900; 
            color: #065f46; 
            margin: 0 0 15px 0; 
            line-height: 1.2; 
        }
        
        .highlight { color: #10b981; }
        
        .subtitle { 
            font-size: 34px; 
            font-weight: 600; 
            color: #047857; 
            margin: 0; 
        }
        
        .form-preview { 
            width: 850px; 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 30px; 
            border: 4px solid #fff; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            box-sizing: border-box;
            z-index: 10;
        }
        
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        .label { font-size: 26px; font-weight: 700; color: #334155; display: flex; align-items: center; gap: 10px; }
        
        .input-box { 
            width: 100%; 
            height: 60px; 
            background: white; 
            border: 3px solid #cbd5e1; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            padding: 0 25px; 
            box-sizing: border-box; 
            font-size: 30px; 
            color: #94a3b8; 
        }
        
        .input-box.filled { 
            border-color: #10b981; 
            color: #065f46; 
            font-weight: 600; 
            background: #f0fdf4;
        }
        
        .print-preview {
            background: white;
            border: 4px dashed #10b981;
            border-radius: 20px;
            padding: 40px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        
        .preview-title {
            font-size: 36px;
            font-weight: 900;
            color: #065f46;
            text-align: center;
            border-bottom: 3px solid #d1fae5;
            padding-bottom: 15px;
            width: 100%;
        }
        
        .qr-with-text {
            display: flex;
            align-items: center;
            gap: 30px;
            background: #f0fdf4;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .qr-code {
            width: 150px;
            height: 150px;
            background: white;
            border: 4px solid #10b981;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            flex-shrink: 0;
        }
        
        .qr-instruction {
            flex: 1;
            font-size: 28px;
            font-weight: 700;
            color: #065f46;
            line-height: 1.5;
        }
        
        .print-icon {
            font-size: 60px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .floating-icon { position: absolute; font-size: 140px; right: 60px; top: 140px; opacity: 0.12; filter: blur(2px); }
        
        .deco-circle {
            position: absolute;
            width: 800px;
            height: 800px;
            background: #a7f3d0;
            border-radius: 50%;
            bottom: -250px;
            right: -250px;
            opacity: 0.4;
            filter: blur(80px);
        }
    </style>
</head>
<body>
    <div class="feed-container">
        <div class="deco-circle"></div>
        <div class="floating-icon">�️</div>
        
        <div class="header">
            <div class="step-badge">STEP 1. 교사 입력</div>
            <h1 class="title">간단히 입력하면<br><span class="highlight">맞춤 QR 안내장</span> 출력!</h1>
            <p class="subtitle">학생별 고유 QR코드가 담긴 안내문 자동 생성</p>
        </div>
        
        <div class="form-preview">
            <div class="input-group">
                <div class="label">👤 담당교사 성명</div>
                <div class="input-box filled">김특수</div>
            </div>
            
            <div class="input-group">
                <div class="label">� 면담 일시</div>
                <div class="input-box filled">2026년 3월 15일 오후 2시</div>
            </div>
            
            <div class="print-preview">
                <div class="preview-title">� 개별화교육 의견서 안내문</div>
                <div class="qr-with-text">
                    <div class="qr-code">📱</div>
                    <div class="qr-instruction">
                        스마트폰으로 QR코드를<br>
                        스캔하시면 의견서를<br>
                        작성하실 수 있습니다.
                    </div>
                </div>
                <div class="print-icon">�️ 인쇄하기</div>
            </div>
        </div>
    </div>
</body>
</html>
