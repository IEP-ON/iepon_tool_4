<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEP-ON 피드 3 - 문자 메시지</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        .feed-container { 
            width: 1080px; 
            height: 1080px; 
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%); 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
        }
        
        .header { text-align: center; margin-bottom: 50px; z-index: 10; }
        
        .step-badge { 
            background: #8b5cf6;
            color: white; 
            padding: 10px 24px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 24px; 
            display: inline-block; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .title { 
            font-size: 68px; 
            font-weight: 900; 
            color: #5b21b6; 
            margin: 0 0 15px 0; 
            line-height: 1.2; 
        }
        
        .highlight { color: #8b5cf6; }
        
        .subtitle { 
            font-size: 34px; 
            font-weight: 600; 
            color: #6d28d9; 
            margin: 0; 
        }
        
        .message-container {
            width: 850px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            border: 4px solid #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 45px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .phone-mockup {
            background: #1f2937;
            border-radius: 40px;
            padding: 50px 40px;
            position: relative;
        }
        
        .phone-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #374151;
        }
        
        .contact-icon {
            width: 70px;
            height: 70px;
            background: #8b5cf6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .contact-name {
            font-size: 32px;
            font-weight: 800;
            color: white;
        }
        
        .message-bubble {
            background: #8b5cf6;
            color: white;
            padding: 28px 32px;
            border-radius: 25px;
            border-top-left-radius: 5px;
            font-size: 26px;
            font-weight: 600;
            line-height: 1.6;
            position: relative;
        }
        
        .link-box {
            background: rgba(255, 255, 255, 0.95);
            color: #5b21b6;
            padding: 22px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            border: 2px dashed #8b5cf6;
        }
        
        .copy-button {
            background: #10b981;
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 30px;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
            margin-top: 10px;
        }
        
        .deco-blob {
            position: absolute;
            width: 900px;
            height: 900px;
            background: #c4b5fd;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            bottom: -300px;
            left: -300px;
            opacity: 0.4;
            animation: blob 20s infinite alternate;
        }

        @keyframes blob {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
    </style>
</head>
<body>
    <div class="feed-container">
        <div class="deco-blob"></div>
        
        <div class="header">
            <div class="step-badge">STEP 2. 전달 방법</div>
            <h1 class="title">QR 안 되는 보호자?<br><span class="highlight">문자 메시지</span>로 보내세요!</h1>
            <p class="subtitle">복사 붙여넣기만 하면 끝</p>
        </div>
        
        <div class="message-container">
            <div class="phone-mockup">
                <div class="phone-header">
                    <div class="contact-icon">👪</div>
                    <div class="contact-name">학부모님</div>
                </div>
                <div class="message-bubble">
                    안녕하세요. ○○학교 특수교사 김특수입니다.<br><br>
                    개별화교육 의견서 작성을 부탁드립니다. 아래 링크를 클릭하시면 스마트폰에서 바로 작성 가능합니다.<br><br>
                    <div class="link-box">
                        📱 https://iepon.app/form?id=ABC123
                    </div>
                </div>
            </div>
            
            <div class="copy-button">
                📋 메시지 복사하기
            </div>
        </div>
    </div>
</body>
</html>
